services:
  space:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-test-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      INTERNAL_CALLBACK_TOKEN: ${INTERNAL_CALLBACK_TOKEN:-local-internal-token-change-me}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-local-admin-token-change-me}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-4o-mini}
      APP_ENV: production
      LOG_LEVEL: INFO
      HF_DATA_DIR: /home/user/data
    volumes:
      - hf_space_data:/home/user/data

volumes:
  hf_space_data:
